<script type="module">

const { svg } = await mermaid.render('p3upd-svg', `flowchart TB
    subgraph AGENTS["Agent Layer"]
        AGT["agent-service\nWebSocket server"]

    subgraph AVAIL["Availability — Dual Layer UPDATED"]

        PG_AGENT[("PostgreSQL agents table\nfallback only\nstatus and current_load\nwritten on shift start/end only")]

        KCONV["conversations topic"]
        KAVAIL["agent-availability topic audit"]
        KSLA["sla-events topic"]

    ASN -->|"no agent found"| NOAGENT
