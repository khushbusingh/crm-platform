<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
const txt = dark ? '#c2c0b6' : '#3d3d3a';
const line = dark ? '#9c9a92' : '#73726c';
const nodeBg = dark ? '#2c2c2a' : '#F1EFE8';
const nodeBorder = dark ? '#5f5e5a' : '#b4b2a9';
const highlightBg = dark ? '#2a4a3a' : '#c8e6d0';
const highlightBorder = dark ? '#3f8f5f' : '#5a9c6f';

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: line,
    textColor: txt,
    primaryColor: nodeBg,
    primaryTextColor: txt,
    primaryBorderColor: nodeBorder,
    secondaryColor: nodeBg,
    tertiaryColor: nodeBg,
    clusterBkg: dark ? '#232321' : '#fbfaf6',
    clusterBorder: nodeBorder,
    edgeLabelBackground: dark ? '#1c1c1a' : '#ffffff',
  },
});

const { svg } = await mermaid.render('p3arch-svg', `flowchart TB
    subgraph EXIST["Phase 1 and 2 - existing, unchanged"]
        GW["Gateway"]
        BOT["bot-service"]
        ASN["assignment-service"]
        AGT["agent-service"]
        PG[("PostgreSQL")]
        RD[("Redis - TTL availability")]
        MG[("MongoDB")]
    end

    subgraph KAFKA["Phase 3 - Kafka event backbone NEW"]
        KTOPICS["Kafka topics:<br/>tickets, conversations,<br/>agent-availability, sla-events"]
        SLA["SLA Tracker<br/>new consumer"]
        NOTIF["Notification Service<br/>new consumer"]
    end

    subgraph MQ["RabbitMQ - existing queues plus new"]
        AQ["agent.id.queue<br/>now with TTL plus priority"]
        DLQ["Dead Letter Queue NEW"]
        NOAGENT["no-agent queue NEW"]
        NQUEUES["email / whatsapp / sms queues NEW"]
    end

    BREVO["Brevo API"]
    CUST["Customer"]

    ASN -->|publish ticket events| KTOPICS
    BOT -->|publish conversation events| KTOPICS
    AGT -->|publish availability events audit only| KTOPICS

    KTOPICS -->|consume tickets| SLA
    SLA -->|publish warn or breach| KTOPICS
    KTOPICS -->|consume ticket resolved| NOTIF

    NOTIF -->|dispatch| NQUEUES
    NQUEUES --> BREVO
    BREVO --> CUST

    ASN -->|assign| AQ
    AQ -->|ack timeout| DLQ
    DLQ -->|reassign| ASN
    ASN -->|no eligible agent| NOAGENT
    NOAGENT -->|customer ETA| CUST

    AGT -->|consume| AQ

    style KTOPICS fill:${highlightBg},stroke:${highlightBorder},stroke-width:3px
    style SLA fill:${highlightBg},stroke:${highlightBorder},stroke-width:3px
    style NOTIF fill:${highlightBg},stroke:${highlightBorder},stroke-width:3px
    style DLQ fill:${highlightBg},stroke:${highlightBorder},stroke-width:3px
    style NOAGENT fill:${highlightBg},stroke:${highlightBorder},stroke-width:3px
    style NQUEUES fill:${highlightBg},stroke:${highlightBorder},stroke-width:3px
`);
document.getElementById('p3arch').innerHTML = svg;
</script></body></html>
