<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
const txt = dark ? '#c2c0b6' : '#3d3d3a';
const line = dark ? '#9c9a92' : '#73726c';
const boxBg = dark ? '#2c2c2a' : '#F1EFE8';
const boxBorder = dark ? '#5f5e5a' : '#b4b2a9';
const noteBg = dark ? '#444441' : '#D3D1C7';

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: line,
    textColor: txt,
    actorTextColor: txt,
    actorBkg: boxBg,
    actorBorder: boxBorder,
    actorLineColor: line,
    signalColor: line,
    signalTextColor: txt,
    labelBoxBkgColor: boxBg,
    labelBoxBorderColor: boxBorder,
    labelTextColor: txt,
    noteBkgColor: noteBg,
    noteBorderColor: boxBorder,
    noteTextColor: txt,
    activationBorderColor: boxBorder,
    activationBkgColor: boxBg,
    sequenceNumberColor: '#ffffff',
  },
});

const { svg } = await mermaid.render('p3seq-svg', `sequenceDiagram
    autonumber
    participant AS as Assignment Svc
    participant K as Kafka
    participant SLA as SLA Tracker
    participant RQ as RabbitMQ
    participant A1 as Agent 1 no ack
    participant A2 as Agent 2
    participant N as Notification Svc
    participant BR as Brevo
    participant CU as Customer

    AS->>K: publish ticket created P1
    K->>SLA: consume event
    SLA->>SLA: start 1hr SLA timer

    AS->>RQ: publish agent.1.queue TTL 60s
    Note over RQ,A1: agent 1 never acknowledges

    Note over SLA: at 75 percent elapsed
    SLA->>K: publish sla warning event

    RQ->>RQ: TTL expires, move to DLQ
    RQ->>AS: dead letter event
    AS->>RQ: reassign to agent.2.queue
    RQ->>A2: deliver ticket
    A2-->>RQ: ack

    A2->>AS: POST resolve
    AS->>K: publish ticket resolved

    K->>N: consume resolved event
    N->>RQ: publish email queue
    N->>RQ: publish sms queue
    RQ->>N: worker picks up
    N->>BR: send email and sms
    BR->>CU: notification delivered
`);
document.getElementById('p3seq').innerHTML = svg;
</script></body></html>
